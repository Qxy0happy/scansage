name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        shell: bash
        run: |
          go build -o "scansage-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" .

      - uses: actions/upload-artifact@v4
        with:
          name: scansage-${{ matrix.goos }}-${{ matrix.goarch }}
          path: scansage-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            scansage-linux-amd64/*
            scansage-windows-amd64/*
          generate_release_notes: true
